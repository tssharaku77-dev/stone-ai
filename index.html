<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石の声を聴く - 天然石鑑定</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✨ 石の声を聴く ✨</h1>
        <p>あなたの石の名前や、今の悩みを教えてください。</p>
        <textarea id="stoneInput" placeholder="例：ラピスラズリ / 最近疲れやすい..."></textarea>
        
        <div class="button-group">
            <button onclick="execute('diag')">石に相談する</button>
            <button onclick="execute('info')">石を調べる</button>
        </div>

        <div id="resultArea" class="result-area"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
